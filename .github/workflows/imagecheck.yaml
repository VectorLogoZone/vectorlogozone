name: imagecheck

on:
  pull_request:
    paths:
      - src/content/logos/**/*.svg
  push:
    paths:
      - src/content/logos/**/*.svg
  workflow_dispatch:

jobs:
  imagecheck:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install fflint
      run: |
        curl \
          --location \
          --silent \
          https://github.com/FileFormatInfo/fflint/releases/latest/download/fflint_Linux_x86_64.tar.gz \
          | tar -xz fflint

    - name: Check images
      run: |
        PATH=.:$PATH bin/chksvgimage.sh

